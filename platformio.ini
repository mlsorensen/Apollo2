; PlatformIO project — La Marzocco Micra remote
;
; Two build environments share one source tree:
;   esp32-s3-micra  → real firmware for the Waveshare ESP32-S3-Touch-LCD-4.3C
;   sim             → native host build that renders the UI to a PNG (no board)
;
; The portable layers (src/ui, src/core headers) compile in BOTH. Only the
; platform glue differs, selected per-env with build_src_filter:
;   device build → src/device + src/ui
;   sim build    → src/sim + src/ui + src/platform_host
; Header-only core/ is pulled in via include/ regardless of filter.

; ============================================================================
; Device firmware. Target board is selected with a -DBOARD_* flag below; the
; pins for that board live in include/platform_esp32/board_config.h. Currently
; the Waveshare ESP32-S3-Touch-LCD-2 (ESP32-S3R8: 16MB flash, 8MB octal PSRAM,
; 240x320 ST7789 SPI panel). No stock board def exists, so we start from the
; DevKitC-1 and override flash/PSRAM to match.
; ============================================================================
[env:esp32-s3-micra]
; pioarduino fork of platform-espressif32: provides Arduino-ESP32 core 3.x
; (IDF 5.x). Required by Arduino_GFX 1.6.x and matches Waveshare's own demos.
; The official PlatformIO espressif32 platform is still on core 2.0.x.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_src_filter = -<*> +<device/> +<platform_esp32/> +<ui/> +<core/>

; --- Memory layout for the ESP32-S3R8 ---
; qio_opi = QIO flash + Octal-SPI PSRAM (the R8 part has 8MB octal PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; Drop LVGL's ARM-only Helium assembly (can't assemble on Xtensa).
extra_scripts =
    pre:tools/pio_skip_lvgl_asm.py
    pre:tools/pio_version.py

build_flags =
    ; --- Native USB serial (no UART bridge chip on this board) ---
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Which physical board we're building for (see board_config.h) ---
    -D BOARD_WAVESHARE_S3_LCD_2
    ; --- LVGL finds include/lv_conf.h (shared with the sim) ---
    -D LV_CONF_INCLUDE_SIMPLE
    ; --- Bigger loop-task stack: the UI rebuild (theme change) + WiFi bring-up run
    ;     here and overflow the 8K default (reboots, esp. on the larger 7B UI). ---
    -D ARDUINO_LOOP_STACK_SIZE=16384
    -I ${platformio.include_dir}

lib_deps =
    lvgl/lvgl@^9.2.0
    moononournation/GFX Library for Arduino@^1.5.0
    h2zero/NimBLE-Arduino@^2.2.0
    bblanchon/ArduinoJson@^7.0.0

; ============================================================================
; Waveshare ESP32-S3-Touch-LCD-7B — 7" 1024x600 RGB parallel panel, GT911 touch,
; I2C "IO extension" (0x24) for reset/backlight. Same MCU/memory as the 2-inch;
; only the board flag differs (selects the board_config.h block + the RGB display
; / GT911 touch backends). Pins/timing from Waveshare's 7B Arduino demo — NOT yet
; hardware-verified.
; ============================================================================
[env:esp32-s3-micra-7b]
extends = env:esp32-s3-micra
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_WAVESHARE_S3_LCD_7B
    -D LV_CONF_INCLUDE_SIMPLE
    -D ARDUINO_LOOP_STACK_SIZE=16384
    -I ${platformio.include_dir}

; ============================================================================
; Waveshare ESP32-S3-Touch-LCD-4.3B — 4.3" 800x480 RGB parallel panel. Per the
; schematic this is the 7B shrunk to 800x480 (same RGB pins / GT911 / expander),
; so it reuses all the 7B backends; only board_config.h's resolution + RGB timing
; differ. NOT yet hardware-verified. Has a PCF85063 RTC (persistent time) — a
; follow-up IClock backend once the panel is up.
; ============================================================================
[env:esp32-s3-micra-4-3b]
extends = env:esp32-s3-micra
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_WAVESHARE_S3_LCD_43B
    -D LV_CONF_INCLUDE_SIMPLE
    -D ARDUINO_LOOP_STACK_SIZE=16384
    -I ${platformio.include_dir}

; ============================================================================
; Waveshare ESP32-S3-Touch-LCD-4.3C — 4.3" 800x480 RGB parallel panel. Same RGB
; pins / GT911 as the 4.3B, but its expander is the 7B-style register-based "IO
; extension" (not a CH422G), adding true PWM backlight dimming + a battery ADC.
; ============================================================================
[env:esp32-s3-micra-4-3c]
extends = env:esp32-s3-micra
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_WAVESHARE_S3_LCD_43C
    -D LV_CONF_INCLUDE_SIMPLE
    -D ARDUINO_LOOP_STACK_SIZE=16384
    -I ${platformio.include_dir}

; ============================================================================
; Waveshare ESP32-P4-WIFI6-Touch-LCD-4.3 — ESP32-P4NRW32 (32MB flash, 32MB
; PSRAM), 4.3" 480x800 ST7701 over 2-lane MIPI-DSI, GT911 touch, WiFi/BLE via an
; on-board ESP32-C6 over SDIO (esp-hosted). NOT an S3 derivative:
;   - Radio: the stock P4 Arduino core routes WiFi through esp_wifi_remote and
;     runs the NimBLE HOST on the P4 with HCI over the hosted SDIO link (its
;     sdkconfig: BT_NIMBLE_ENABLED + BT_CONTROLLER_DISABLED + ESP_HOSTED_*).
;     The hosted SDIO pin defaults (CLK18/CMD19/D0-3=14-17/RST54) match this
;     board's schematic exactly, so no pin overrides are needed.
;   - BLE library: NimBLE-Arduino does NOT support the P4 (bundles its own host
;     + controller assumptions). We use h2zero's esp-nimble-cpp instead — the
;     SAME NimBLE* API (NimBLE-Arduino is its Arduino packaging) compiled
;     against the core's IDF NimBLE host. lib_compat_mode=off because its
;     manifest declares framework=espidf only.
;   - Serial is the on-board USB-UART bridge (no USB-CDC flags).
; Board def: boards/esp32-p4-wifi6-43.json (project-local). UNVERIFIED on HW.
; ============================================================================
[env:esp32-p4-micra-43]
; Pinned explicitly (not "stable"): PlatformIO won't swap an already-installed
; platform when only the URL label changes, which can silently mix builder and
; framework versions. 55.03.39 = Arduino core 3.3.9 / IDF 5.5.4.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-p4-wifi6-43
framework = arduino
monitor_speed = 115200

build_src_filter = -<*> +<device/> +<platform_esp32/> +<ui/> +<core/>

board_build.partitions = default_32MB.csv

extra_scripts =
    pre:tools/pio_skip_lvgl_asm.py
    pre:tools/pio_version.py

lib_compat_mode = off

; --- ESP32-P4 rev v1.x silicon support (this board's chip is rev v1.3) ---
; boards/esp32-p4-wifi6-43.json sets "chip_variant": "esp32p4_es" (same fix as
; arduino-esp32 PR #12341 for the M5Stack Tab5). This selects the core's
; PREBUILT esp32p4_es libs: rev v1.x memory map for app + bootloader (without
; it the 2nd-stage bootloader boot-loops with an illegal-instruction panic on
; pre-v3.0 chips) with NimBLE host + esp-hosted radio link enabled.
; A future board with rev >= 3.0 silicon needs chip_variant = "esp32p4".
;
; BLE additionally requires hostedInitBLE() (Arduino's esp32-hal-hosted) to
; run BEFORE NimBLEDevice::init — see src/device/main.cpp. esp-nimble-cpp
; alone drops into the hosted vhci path with the transport down and dies with
; "H_SDIO_DRV: card init failed".

build_flags =
    -D BOARD_HAS_PSRAM
    -D BOARD_WAVESHARE_P4_WIFI6_43
    -D LV_CONF_INCLUDE_SIMPLE
    -D ARDUINO_LOOP_STACK_SIZE=16384
    -I ${platformio.include_dir}

lib_deps =
    lvgl/lvgl@^9.2.0
    moononournation/GFX Library for Arduino@^1.6.0
    bblanchon/ArduinoJson@^7.0.0
    ; pin to the same 2.x API family as the S3 envs' NimBLE-Arduino
    https://github.com/h2zero/esp-nimble-cpp.git#2.5.0

; ============================================================================
; Waveshare ESP32-P4-WIFI6-Touch-LCD-5 — electronically the 4.3 (same P4NRW32,
; C6-over-SDIO radio, ES8311 audio, battery path); only the panel differs:
; 5" 720x1280 HX8394 over the same 2-lane MIPI-DSI (different DCS init table,
; reset/backlight polarities — all in board_config.h + display.cpp). The UI
; renders the wide 800x480 layout at 1.5x (BOARD_UI_SCALE). Everything in the
; 4.3 env's comment block (rev v1.x silicon, hostedInitBLE, esp-nimble-cpp)
; applies here unchanged. UNVERIFIED on hardware yet.
; ============================================================================
[env:esp32-p4-micra-5]
extends = env:esp32-p4-micra-43
board = esp32-p4-wifi6-5
build_flags =
    -D BOARD_HAS_PSRAM
    -D BOARD_WAVESHARE_P4_WIFI6_5
    -D LV_CONF_INCLUDE_SIMPLE
    -D ARDUINO_LOOP_STACK_SIZE=16384
    -I ${platformio.include_dir}

; ============================================================================
; Host simulator — builds a normal macOS/Linux executable that renders one UI
; frame to renders/<name>.png. No hardware required. Run with tools/sim.sh.
; ============================================================================
[env:sim]
platform = native

; core/ compiles here too: the sim doesn't run the BLE protocol links, but
; building them natively enforces that they stay free of platform APIs.
build_src_filter = -<*> +<sim/> +<ui/> +<platform_host/> +<core/>

; Host build hooks: drop LVGL's ARM-only assembly (shared) and scope -std=c++20
; to C++ files (LVGL's C sources reject a C++ standard flag).
extra_scripts =
    pre:tools/pio_skip_lvgl_asm.py
    pre:tools/pio_sim_build.py
    pre:tools/pio_version.py

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I ${platformio.include_dir}
    -Wno-deprecated-declarations
    ; Host has plenty of RAM; give LVGL a huge pool so no screen can exhaust it
    ; (an exhausted LVGL pool hangs in lv_realloc rather than failing). 16 MB.
    -D LV_MEM_SIZE=16777216

lib_deps =
    lvgl/lvgl@^9.2.0
    ; header-only + host-portable; needed by src/core/micra_link.cpp
    bblanchon/ArduinoJson@^7.0.0
